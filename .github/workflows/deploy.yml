name: Deploy to EC2

# Auto-deploy on every push to main. You can also trigger it by hand from the
# Actions tab (workflow_dispatch) — handy for a forced redeploy.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never let two deploys run at once (they'd fight over git + pm2). A new push
# waits for the in-flight deploy to finish rather than cancelling it.
concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m       # the Next build is slow on a 1 GB box
          script: |
            set -e
            cd ~/du

            # Pull the new code, remembering where we were so we can tell what
            # changed and rebuild only the affected app.
            BEFORE=$(git rev-parse HEAD)
            git fetch --prune origin main
            git reset --hard origin/main
            AFTER=$(git rev-parse HEAD)
            echo "Deploying ${BEFORE} -> ${AFTER}"
            CHANGED=$(git diff --name-only "${BEFORE}" "${AFTER}")
            echo "Changed files:"; echo "${CHANGED:-<none>}"

            # ---- Backend (only if backend/ changed) ----
            if echo "$CHANGED" | grep -q '^backend/'; then
              echo "==> Backend changed — rebuilding"
              cd ~/du/backend
              # Reinstall deps only when the lockfile moved (npm ci is heavy on 1 GB).
              if echo "$CHANGED" | grep -q '^backend/package-lock.json'; then npm ci; fi
              npx prisma generate
              npx prisma migrate deploy      # no-op when there are no new migrations
              npm run build
              pm2 restart du-backend
            fi

            # ---- Frontend (only if frontend/ changed) ----
            if echo "$CHANGED" | grep -q '^frontend/'; then
              echo "==> Frontend changed — rebuilding"
              cd ~/du/frontend
              if echo "$CHANGED" | grep -q '^frontend/package-lock.json'; then npm ci; fi
              npm run build
              pm2 restart du-frontend
            fi

            pm2 save
            echo "Deploy complete."
