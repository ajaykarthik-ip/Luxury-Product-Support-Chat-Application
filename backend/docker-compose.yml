services:
  postgres:
    image: postgres:16-alpine
    container_name: luxury-chat-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: luxury_chat
    # Host port 5433 -> container port 5432. We use 5433 on the host to avoid
    # colliding with any other Postgres already listening on 5432.
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
